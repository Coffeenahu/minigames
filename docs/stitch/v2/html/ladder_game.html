<!DOCTYPE html>
<html lang="ko"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        "primary": "#9F9FED",
                        "secondary": "#D4C1EC",
                        "ladder-bg": "#FEF9FF",
                    },
                    fontFamily: {
                        "display": ["Plus Jakarta Sans"]
                    },
                    borderRadius: {"DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px"},
                },
            },
        }
    </script>
<style type="text/tailwindcss">
        body {
            min-height: 100dvh;
            background-color: #FEF9FF;
        }
        .ladder-line {
            background-color: #D4C1EC;
        }
        .primary-btn {
            background-color: #9F9FED;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="font-display text-slate-900">
<div class="relative flex h-screen max-w-md mx-auto flex-col bg-ladder-bg overflow-hidden shadow-xl border-x border-secondary/20">
<div class="flex items-center p-4 sticky top-0 z-10">
<div class="text-primary flex size-10 items-center justify-center rounded-full bg-secondary/20 cursor-pointer">
<span class="material-symbols-outlined">arrow_back</span>
</div>
<h2 class="text-slate-800 text-lg font-bold leading-tight flex-1 text-center pr-10">사다리 타기</h2>
</div>
<div class="flex-1 flex flex-col px-6 pb-10 pt-4 overflow-y-auto">
<div class="grid grid-cols-4 gap-4 mb-8">
<div class="flex flex-col items-center">
<span class="text-base font-bold text-slate-700">철수</span>
</div>
<div class="flex flex-col items-center">
<span class="text-base font-bold text-slate-700">영희</span>
</div>
<div class="flex flex-col items-center">
<span class="text-base font-bold text-slate-700">민수</span>
</div>
<div class="flex flex-col items-center">
<span class="text-base font-bold text-slate-700">지수</span>
</div>
</div>
<div class="relative h-96 flex justify-between px-7">
<div class="w-1.5 h-full ladder-line rounded-full relative">
<div class="absolute top-1/4 left-0 w-full h-1/2 bg-white/40 rounded-full"></div>
</div>
<div class="w-1.5 h-full ladder-line rounded-full"></div>
<div class="w-1.5 h-full ladder-line rounded-full"></div>
<div class="w-1.5 h-full ladder-line rounded-full"></div>
<div class="absolute inset-0 px-7 py-12 flex flex-col justify-between pointer-events-none">
<div class="flex">
<div class="h-1.5 w-1/3 ladder-line rounded-full mt-4"></div>
<div class="h-1.5 w-1/3 ml-auto ladder-line rounded-full mt-12"></div>
</div>
<div class="flex justify-center">
<div class="h-1.5 w-1/3 ladder-line rounded-full"></div>
</div>
<div class="flex">
<div class="h-1.5 w-1/3 ladder-line rounded-full mb-8"></div>
<div class="h-1.5 w-1/3 ml-auto ladder-line rounded-full mb-2"></div>
</div>
</div>
</div>
<div class="grid grid-cols-4 gap-4 mt-8 mb-12">
<div class="flex flex-col items-center gap-2">
<div class="size-14 rounded-xl bg-white border border-secondary flex items-center justify-center shadow-sm">
<span class="material-symbols-outlined text-primary">stars</span>
</div>
<span class="text-xs font-bold text-slate-600">당첨</span>
</div>
<div class="flex flex-col items-center gap-2">
<div class="size-14 rounded-xl bg-white/50 border border-secondary/50 flex items-center justify-center shadow-sm">
<span class="material-symbols-outlined text-secondary">close</span>
</div>
<span class="text-xs font-bold text-slate-400">꽝</span>
</div>
<div class="flex flex-col items-center gap-2">
<div class="size-14 rounded-xl bg-white border border-secondary flex items-center justify-center shadow-sm">
<span class="material-symbols-outlined text-primary">coffee</span>
</div>
<span class="text-xs font-bold text-slate-600">커피쏘기</span>
</div>
<div class="flex flex-col items-center gap-2">
<div class="size-14 rounded-xl bg-white/50 border border-secondary/50 flex items-center justify-center shadow-sm">
<span class="material-symbols-outlined text-secondary">close</span>
</div>
<span class="text-xs font-bold text-slate-400">꽝</span>
</div>
</div>
<div class="flex flex-col gap-3 mt-auto">
<button class="w-full primary-btn text-white py-4 rounded-xl font-bold text-base shadow-lg shadow-primary/30 active:scale-[0.98] transition-all">
                    전체 결과 보기
                </button>
<button class="w-full bg-white text-slate-500 py-4 rounded-xl font-bold text-base border border-secondary active:scale-[0.98] transition-all">
                    다시 하기
                </button>
</div>
</div>
</div>

</body></html>
