<!DOCTYPE html>
<html class="light" lang="ko"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>복불복 게임 홈 화면</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#9F9FED",
                        "secondary": "#D4C1EC",
                        "background-light": "#FEF9FF",
                        "background-dark": "#121220",
                    },
                    fontFamily: {
                        "display": ["Plus Jakarta Sans", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "1rem",
                        "xl": "1.5rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style type="text/tailwindcss">
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #FEF9FF;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .game-card {
            background-color: #D4C1EC;
            aspect-ratio: 1 / 1.15;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        .play-button {
            background-color: #9F9FED;
        }
        .icon-container {
            @apply w-16 h-16 bg-white/40 rounded-full flex items-center justify-center shadow-inner overflow-hidden relative;
        }
        .custom-icon-wrapper {
            @apply w-10 h-10 flex items-center justify-center;
        }
        .dice-custom {
            width: 30px;
            height: 30px;
            background: white;
            border-radius: 5px;
            border: 2px solid #333;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(3, 1fr);
            padding: 3px;
            gap: 2px;
        }
        .dice-dot {
            background: #333;
            border-radius: 50%;
            width: 4px;
            height: 4px;
            margin: auto;
        }
        .pirate-flag-custom {
            width: 32px;
            height: 24px;
            background: #222;
            border-radius: 2px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            box-shadow: 1px 1px 3px rgba(0,0,0,0.3);
        }
        .pirate-flag-custom::before {
            content: '💀';
            font-size: 14px;
            line-height: 1;
        }
        .pirate-flag-custom::after {
            content: '';
            position: absolute;
            left: -2px;
            top: -2px;
            bottom: -2px;
            width: 2px;
            background: #444;
        }
        .ladder-custom {
            width: 24px;
            height: 32px;
            display: flex;
            justify-content: space-between;
            position: relative;
        }
        .ladder-rail {
            width: 5px;
            height: 100%;
            background: #8B4513;
            border-radius: 1px;
        }
        .ladder-rungs-container {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            justify-content: space-around;
            padding: 4px 0;
            align-items: center;
        }
        .ladder-rung {
            height: 3px;
            width: 14px;
            background: #8B4513;
            border-radius: 1px;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-[#FEF9FF] dark:bg-background-dark text-slate-900 dark:text-slate-100 min-h-screen flex flex-col">
<main class="flex-1 px-6 pt-12 pb-32">

<div class="flex flex-col items-center gap-3 w-full">
<div class="icon-container">
<div class="custom-icon-wrapper text-[#FFD700]">
<span class="material-symbols-outlined !text-[40px]">monetization_on</span>
</div>
</div>
<h3 class="font-extrabold text-base text-white">동전 던지기</h3>
</div>
<button class="play-button w-full py-2.5 text-white font-black rounded-xl text-sm shadow-md mt-4">시작하기</button>
</div>
<div class="game-card p-5 rounded-3xl shadow-sm items-center text-center transition-transform active:scale-95">
<div class="flex flex-col items-center gap-3 w-full">
<div class="icon-container">
<div class="custom-icon-wrapper">
<div class="dice-custom">
<div class="dice-dot"></div><div></div><div class="dice-dot"></div>
<div></div><div class="dice-dot"></div><div></div>
<div class="dice-dot"></div><div></div><div class="dice-dot"></div>
</div>
</div>
</div>
<h3 class="font-extrabold text-base text-white">주사위 던지기</h3>
</div>
<button class="play-button w-full py-2.5 text-white font-black rounded-xl text-sm shadow-md mt-4">시작하기</button>
</div>
<div class="game-card p-5 rounded-3xl shadow-sm items-center text-center transition-transform active:scale-95">
<div class="flex flex-col items-center gap-3 w-full">
<div class="icon-container">
<div class="custom-icon-wrapper">
<div class="pirate-flag-custom"></div>
</div>
</div>
<h3 class="font-extrabold text-base text-white">해적 룰렛</h3>
</div>
<button class="play-button w-full py-2.5 text-white font-black rounded-xl text-sm shadow-md mt-4">시작하기</button>
</div>
<div class="game-card p-5 rounded-3xl shadow-sm items-center text-center transition-transform active:scale-95">
<div class="flex flex-col items-center gap-3 w-full">
<div class="icon-container">
<div class="custom-icon-wrapper">
<div class="ladder-custom">
<div class="ladder-rail"></div>
<div class="ladder-rungs-container">
<div class="ladder-rung"></div>
<div class="ladder-rung"></div>
<div class="ladder-rung"></div>
<div class="ladder-rung"></div>
</div>
<div class="ladder-rail"></div>
</div>
</div>
</div>
<h3 class="font-extrabold text-base text-white">사다리 타기</h3>
</div>
<button class="play-button w-full py-2.5 text-white font-black rounded-xl text-sm shadow-md mt-4">시작하기</button>
</div>
</section>
<section class="mt-4">
<div class="bg-secondary/10 rounded-3xl p-4 flex items-center gap-4 border border-secondary/20">
<div class="w-12 h-12 bg-white rounded-2xl flex items-center justify-center text-primary shadow-sm">
<span class="material-symbols-outlined">rocket_launch</span>
</div>
<div class="flex-1">
<p class="font-extrabold text-sm">랜덤 매치</p>
<p class="text-xs text-slate-500 dark:text-slate-400">빠르게 게임 방에 참여하세요</p>
</div>
<span class="material-symbols-outlined text-slate-400">chevron_right</span>
</div>
</section>
</main>
<nav class="fixed bottom-0 left-0 right-0 bg-white/80 dark:bg-background-dark/80 backdrop-blur-md border-t border-secondary/20 pb-8 pt-3 px-8 flex justify-between items-center z-20">
<a class="flex flex-col items-center gap-1 text-primary flex-1" href="#">
<span class="material-symbols-outlined">videogame_asset</span>
<span class="text-[10px] font-bold tracking-wider">게임</span>
</a>
<a class="flex flex-col items-center gap-1 text-slate-400 flex-1" href="#">
<span class="material-symbols-outlined">history</span>

</a>
<a class="flex flex-col items-center gap-1 text-slate-400 flex-1" href="#">

</a>
</nav>

</body></html>
